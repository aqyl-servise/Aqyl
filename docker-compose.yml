services:
  postgres:
    image: postgres:16-alpine
    container_name: aqyl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aqyl
      POSTGRES_USER: aqyl
      POSTGRES_PASSWORD: aqyl123
    ports:
      - "5432:5432"
    volumes:
      - aqyl-postgres-data:/var/lib/postgresql/data

volumes:
  aqyl-postgres-data:
